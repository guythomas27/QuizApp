<head>
    <link rel="stylesheet" href="MCQ.css">
</head>

<!-- Multiple Choice Quiz Interface -->

<!-- Quiz Container -->
<div id="quiz-container" class="quiz-card">
    <!-- Quiz Header -->
    <div class="quiz-header">
        <h2 id="question-text">Loading question...</h2> <!-- Placeholder Text -->
        <span id="timer-display">Time: --:--</span> <!-- Timer Display -->
    </div>

    <!-- Quiz Options -->
    <form id="options-form" class="options-container">
        </form>

    <!-- EXAMPLE OPTIONS -->
    <form id="options-form" class="options-container">
    <label class="option-label">
        <input type="radio" name="quiz-option" value="One"> One
    </label>  
    <label class="option-label selected">
        <input type="radio" name="quiz-option" value="Two" checked> Two
    </label>
    
    <label class="option-label">
        <input type="radio" name="quiz-option" value="Three"> Three
    </label>
    
    <label class="option-label">
        <input type="radio" name="quiz-option" value="Four"> Four
    </label>
    </form>

    <!-- Quiz Footer -->
    <div class="quiz-footer">
        <!-- Submit Button -->
        <button type="button" id="submit-btn">Submit Answer</button>
    </div>
</div>
