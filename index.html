<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quiz App</title>
    <link rel="stylesheet" href="MCQ.css">
</head>
<body>
    <div id="selector-container" style="text-align: center; margin: 20px;"></div>

    <div id="quiz-container" class="quiz-card hidden"> 
        <div class="quiz-header">
            <h2 id="question-text">Loading Question...</h2>
            <div id="timer">10:00</div> </div>

        <form id="options-form" class="options-container"></form>

        <div class="quiz-footer">
            <button type="button" id="submit-btn" disabled>Submit Answer</button>
        </div>

        <div id="result-container" class="hidden">
            <p id="feedback-message"></p>
            <h3 id="final-score"></h3>
            <button type="button" id="next-btn">Next Question</button>
            <button type="button" id="restart-btn" class="hidden">Take Another Quiz</button>
        </div>
    </div>

    <script src="quiz.js"></script>
</body>
</html>
